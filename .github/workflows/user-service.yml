name: User Service CI

on:
  push:
    branches:
      - main
      - develop
    paths:
      - '.github/workflows/**'
      - 'apps/user-service/**'
      - 'libs/common/**'
      - 'libs/prisma/**'
      - 'libs/kafka/**'
      - 'libs/proto-schema/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig*.json'

  pull_request:
    branches:
      - main
      - develop
    paths:
      - '.github/workflows/**'
      - 'apps/user-service/**'
      - 'libs/common/**'
      - 'libs/prisma/**'
      - 'libs/kafka/**'
      - 'libs/proto-schema/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig*.json'

jobs:
  user-service:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm install

      - name: Generate Auth Prisma Client
        run: npm run user:prisma:generate

      - name: Build User Service
        run: npx nest build user-service