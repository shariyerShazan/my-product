// proto/auth.proto
syntax = "proto3";

package auth;

// ── Service Definition ────────────────────────────
service AuthService {
  rpc Register    (RegisterRequest)      returns (BasicResponse);
  rpc VerifyRegistration (VerifyRegistrationRequest)    returns (BasicResponse);
  rpc ForgotPasswordRequest (ForgotPassRequest) returns (BasicResponse);
  rpc ResetPassword (ResetPasswordRequest)    returns (BasicResponse);
  rpc Login       (LoginRequest)         returns (AuthResponse);
  rpc Logout      (LogoutRequest)        returns (BasicResponse);
  rpc VerifyToken (VerifyTokenRequest)   returns (VerifyTokenResponse);
  rpc RefreshToken (RefreshTokenRequest)  returns (AuthResponse);
  rpc ChangePassword (ChangePassRequest)  returns (BasicResponse);
  rpc GetUserById (GetUserByIdRequest)    returns (UserResponse);
  rpc GetUserByEmail (GetUserByEmailRequest) returns (UserResponse);
  rpc GetAllUsers (GetAllUsersRequest)    returns (AllUsersResponse);
}

// ── Register ──────────────────────────────────────
message RegisterRequest {
  string name     = 1;
  string email    = 2;
  string password = 3;
}

message VerifyRegistrationRequest {
  string email = 1;
  string otp = 2;
}

message ResetPasswordRequest {
  string email = 1;
  string otp = 2;
  string newPassword = 3;
}



message ForgotPassRequest {
  string email  =1;
}

message BasicResponse {
  bool success = 1;
  string message = 2;
}

message ChangePassRequest {
  string userId = 1;
  string oldPassword = 2;
  string newPassword  = 3;
}

// ── Login ─────────────────────────────────────────
message LoginRequest {
  string email    = 1;
  string password = 2;
}

// ── Logout ────────────────────────────────────────
message LogoutRequest {
  string userId = 1;
}

// ── Verify Token ──────────────────────────────────
message VerifyTokenRequest {
  string token = 1;
}

message VerifyTokenResponse {
  bool   valid     = 1;
  string userId    = 2;
  string email     = 3;
  string role      = 4;
  string message   = 5;
}

// ── Refresh Token ─────────────────────────────────
message RefreshTokenRequest {
  string accessToken = 1;
  string refreshToken = 2;
}

// ── Shared Response ───────────────────────────────

message GetUserByIdRequest {
  string userId = 1;
}

message GetUserByEmailRequest {
  string email = 1;
}

message AuthResponse {
  bool   success      = 1;
  string accessToken  = 2;
  string refreshToken = 3;
  string message      = 4;
  UserData user       = 5;
}


message UserResponse {
  bool success = 1;
  string message = 2;
  UserData user = 3;
}


message AllUsersResponse {
  bool success = 1;
  string message = 2;
  repeated UserData users = 3; 
}

message GetAllUsersRequest {
  int32 page  = 1;
  int32 limit = 2;
}
message UserData {
  string id        = 1;
  string name      = 2;
  string email     = 3;
  string role      = 4;
  string createdAt = 5;
}